capture:
  enabled: true
  interval_seconds: 60
  monitors: "primary"
  
  excluded_apps:
    - "1Password"
    - "Bitwarden"
    - "LastPass"
    - "Keychain Access"
    - "Zoom"
    - "Google Meet"
    - "Microsoft Teams"
    - "Webex"
    - "FaceTime"
    - "Slack Huddle"
    - "Discord"  # when in voice/video
    
  excluded_titles:
    - "private"
    - "incognito"
    - "Private Browsing"

storage:
  retention_days: 30
  db_path: "data/coachy.db"
  screenshots_path: "data/screenshots"

processing:
  ocr_enabled: true
  classifier_backend: "rules"
  local_llm:
    enabled: false
    provider: "lmstudio"
    model: "phi-3-mini"
    endpoint: "http://localhost:1234/v1"

coach:
  default_persona: "grove"
  llm_provider: "anthropic"
  anthropic:
    model: "claude-sonnet-4-20250514"
  digest_format: "markdown"

logging:
  level: "INFO"
  file: "data/logs/coachy.log"